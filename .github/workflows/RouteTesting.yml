name: Python Backend Route Tests 

on:
  push:
    branches:
      - "**"
      - "!Production"

jobs:
  test:
    name: Python Backend Route Tests (Flask + Mongo)
    runs-on: ubuntu-latest

    env:
      # Your app reads these to connect to Mongo
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      MONGODB_NAME: ${{ secrets.MONGODB_NAME }}

    steps:
      - name: Initalize GitHub Actions workflow
        uses: actions/checkout@v4

      - name: Show repo files (debug)
        run: |
          pwd
          ls -la
          echo "---- AHFULapp ----"
          ls -la || true
          echo "---- Backend ----"
          ls -la Backend || true
      
      - name: Verify requirements.txt Exists
        run: |
          echo "Working dir: $(pwd)"
          if [ ! -f Backend/requirements.txt ]; then
            echo "Backend/requirements.txt not found at repo root!" >&2
            exit 1
          fi
          echo "Backend/requirements.txt found"

      - name: Initialize Python/Cache
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          # Cache pip packages between workflow runs to avoid reinstalling unchanged requirements
          cache: 'pip'
          # Invalidate cache when requirements.txt changes
          cache-dependency-path: Backend/requirements.txt

      - name: (Re)Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Backend/requirements.txt

      - name: Run Backend Route Tests
        env:
          PYTHONPATH: ${{ github.workspace }}/Backend
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: pytest -s -q
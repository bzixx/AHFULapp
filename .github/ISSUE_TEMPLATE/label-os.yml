name: Label OS on Bug Report

on:
  issues:
    types: [opened]

jobs:
  label-os:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Apply OS label
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const labels = [];

            if (body.includes('Windows'))  labels.push('os: Windows');
            if (body.includes('macOS'))    labels.push('os: macOS');
            if (body.includes('Linux'))    labels.push('os: Linux');
            if (body.includes('Android'))  labels.push('os: Android');
            if (body.includes('iOS'))      labels.push('os: iOS');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: labels
              });
            }
